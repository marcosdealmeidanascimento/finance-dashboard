<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Due</title>
</head>
<body style="font-family: Arial, sans-serif;">

    <h2 style="color: #333;">Payment Due Reminder</h2>

    <p>Hello, <b th:text="${name}"></b></p>

    <p>
        Your payment <b th:text="${description}"></b>
        (ID: <span th:text="${id}"></span>)
        is due on <b th:text="${dueDate}"></b>.
    </p>

    <p style="color: red;">
        Please make the payment as soon as possible.
    </p>

    <hr>

    <small>This is an automated message.</small>

</body>
</html>
